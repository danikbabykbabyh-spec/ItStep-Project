<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#050508">
  <title>Страница не найдена — Apollo 11 Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" href="Favicon.svg" type="image/svg+xml">
  <link rel="icon" href="Favicon.ico" sizes="any">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #050508;
      color: #e8eaf0;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      max-width: 480px;
      width: 100%;
      text-align: center;
      background: rgba(15,17,23,0.9);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(99,222,219,0.05);
    }

    .code-big {
      font-family: 'Space Mono', monospace;
      font-size: clamp(4rem, 15vw, 7rem);
      font-weight: 700;
      color: #63dedb;
      text-shadow: 0 0 40px rgba(99,222,219,0.4);
      line-height: 1;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #e8eaf0;
    }

    p {
      color: #a0a8b8;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.8rem 2rem;
      background: #63dedb;
      color: #050508;
      text-decoration: none;
      border-radius: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 0.875rem;
      font-weight: 700;
      transition: transform 0.15s ease, box-shadow 0.25s ease;
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(99,222,219,0.35);
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="code-big">404</p>
    <h1>Страница не найдена</h1>
    <p>Указанный файл не существует. Проверьте правильность URL или вернитесь на главную.</p>
    <a href="index.html">← На главную</a>
  </div>
</body>
</html>
