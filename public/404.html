<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#0B0C10">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Страница не найдена — Apollo 11 Archive</title>
    <style media="screen">
      :root {
        --bg: #0B0C10;
        --text: #C5C6C7;
        --muted: #9AA0A6;
        --accent: #66FCF1;
        --accent-2: #FF8A42;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #FFFFFF;
          --text: #1F2833;
          --muted: #555555;
          --accent: #00897B;
          --accent-2: #FF5722;
        }
      }

      * {
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
      }

      body { 
        background: var(--bg); 
        color: var(--text); 
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        margin: 0; 
        padding: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-text-size-adjust: 100%;
      }

      #message { 
        background: var(--bg);
        max-width: 520px; 
        margin: 3rem auto 1rem; 
        padding: 2rem;
        border-radius: 12px;
        border: 1px solid rgba(102,252,241,0.1);
      }

      #message h1 { 
        font-size: 2.5rem; 
        font-weight: 700; 
        color: var(--accent); 
        margin: 0 0 0.5rem 0;
        letter-spacing: 0.02em;
      }

      #message h2 { 
        color: var(--accent); 
        font-weight: 700; 
        font-size: 1rem; 
        margin: 0 0 1rem 0;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      #message p { 
        line-height: 1.6; 
        margin: 1rem 0; 
        font-size: 1rem;
        color: var(--text);
        opacity: 0.95;
      }

      #message a { 
        display: inline-block; 
        text-align: center; 
        background: var(--accent); 
        color: var(--bg); 
        text-decoration: none; 
        padding: 0.75rem 1.5rem;
        border-radius: 6px;
        font-weight: 600;
        transition: transform 220ms ease, box-shadow 220ms ease;
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 1.5rem;
        -webkit-user-select: none;
        user-select: none;
      }

      #message a:hover,
      #message a:focus {
        transform: translateY(-2px);
        box-shadow: 0 12px 24px rgba(102,252,241,0.15);
        outline: none;
      }

      #message a:focus {
        outline: 3px solid rgba(102,252,241,0.12);
        outline-offset: 3px;
      }

      code {
        background: rgba(102,252,241,0.08);
        color: var(--accent);
        padding: 0.2em 0.4em;
        border-radius: 3px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
        font-size: 0.9em;
      }

      #load { 
        color: var(--muted); 
        text-align: center; 
        font-size: 0.9rem;
        opacity: 0.7;
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          transition: none !important;
          animation: none !important;
        }

        #message a:hover,
        #message a:focus {
          transform: none;
        }
      }

      @media (max-width: 600px) {
        #message { 
          margin: 1.5rem 1rem; 
          padding: 1.5rem;
        }

        #message h1 {
          font-size: 2rem;
        }

        body {
          border-top: 4px solid var(--accent);
        }
      }
    </style>
  </head>
  <body>
    <div id="message">
      <h2>404</h2>
      <h1>Страница не найдена</h1>
      <p>Указанный файл не найден на этом сайте. Проверьте правильность URL и попробуйте снова.</p>
      <a href="index.html">Вернуться на главную</a>
      <h3 style="font-size: 1rem; color: var(--muted); margin-top: 2rem;">Почему я вижу эту страницу?</h3>
      <p style="font-size: 0.95rem; opacity: 0.8;">Эта страница была создана автоматически. Для изменения отредактируйте файл <code>404.html</code> в папке <code>public</code> проекта.</p>
    </div>
  </body>
</html>
