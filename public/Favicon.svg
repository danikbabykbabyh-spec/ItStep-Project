<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Apollo 11 Archive favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0b10"/>
      <stop offset="100%" stop-color="#0f1118"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#63dedb"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="moon" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#e8eaf0"/>
      <stop offset="70%" stop-color="#c0c4d0"/>
      <stop offset="100%" stop-color="#9098a8"/>
    </radialGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#63dedb" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#63dedb" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle glow behind moon -->
  <circle cx="32" cy="28" r="22" fill="url(#glow)" opacity="0.5"/>

  <!-- Orbit ring -->
  <ellipse cx="32" cy="30" rx="24" ry="10" fill="none" stroke="url(#ring)" stroke-width="1.2" opacity="0.5" stroke-dasharray="3 2"/>

  <!-- Moon -->
  <circle cx="32" cy="26" r="13" fill="url(#moon)"/>

  <!-- Moon craters -->
  <circle cx="27" cy="22" r="2.5" fill="#a8adb8" opacity="0.4"/>
  <circle cx="36" cy="28" r="3.2" fill="#a8adb8" opacity="0.35"/>
  <circle cx="30" cy="31" r="1.8" fill="#a8adb8" opacity="0.3"/>
  <circle cx="35" cy="21" r="1.2" fill="#a8adb8" opacity="0.25"/>

  <!-- Small rocket/capsule on orbit -->
  <g transform="translate(50, 24) rotate(25)">
    <polygon points="0,-3.5 1.5,2 -1.5,2" fill="#63dedb"/>
    <rect x="-1.2" y="2" width="2.4" height="1.5" rx="0.3" fill="#ff8c42" opacity="0.8"/>
  </g>

  <!-- "11" text -->
  <text x="32" y="55" font-family="'Space Grotesk','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#63dedb" text-anchor="middle" dominant-baseline="middle" letter-spacing="1">11</text>

  <!-- Stars -->
  <circle cx="8" cy="8" r="0.8" fill="#e8eaf0" opacity="0.6"/>
  <circle cx="55" cy="10" r="0.6" fill="#e8eaf0" opacity="0.5"/>
  <circle cx="12" cy="50" r="0.7" fill="#e8eaf0" opacity="0.4"/>
  <circle cx="52" cy="48" r="0.5" fill="#e8eaf0" opacity="0.5"/>
  <circle cx="6" cy="30" r="0.5" fill="#e8eaf0" opacity="0.35"/>
  <circle cx="58" cy="35" r="0.6" fill="#e8eaf0" opacity="0.3"/>
</svg>
