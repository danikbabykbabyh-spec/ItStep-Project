<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />

  <title>Историческая фотогалерея — Apollo 11 Archive</title>
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <header class="site-header" role="banner">
    <div class="container header-inner">
      <div class="logo">Apollo 11 Archive</div>
      <nav class="site-nav" aria-label="Основная навигация">
        <ul>
          <li><a href="index.html">Главная</a></li>
          <li><a href="crew.html">Экипаж</a></li>
          <li><a href="tech.html">Характеристики</a></li>
          <li><a class="active" href="gallery.html">Галерея</a></li>
          <li><a href="logs.html">Журнал логов</a></li>
          <li><a href="about.html">О проекте</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="gallery-hero" aria-labelledby="gallery-title">
      <div class="container">
        <h1 id="gallery-title">Историческая фотогалерея</h1>
        <p class="section-lead">Подборка ключевых кадров и схем миссии Apollo 11.</p>
      </div>
    </section>

    <section class="gallery-grid container" aria-labelledby="gallery-title">
      <figure>
        <img src="images/3451-medium.jpg" alt="Нил Армстронг — подготовка">
        <figcaption>Подготовка к старту — Нил Армстронг</figcaption>
      </figure>

      <figure>
        <img src="images/Saturn-V.jpg" alt="Запуск Saturn V">
        <figcaption>Запуск Saturn V</figcaption>
      </figure>

      <figure>
        <img src="images/Collins.jpg" alt="Командный модуль — Майкл Коллинз">
        <figcaption>Командный модуль</figcaption>
      </figure>

      <figure>
        <img src="images/Appolo-11-module.jpg" alt="Лунный модуль Орел">
        <figcaption>Лунный модуль «Орел»</figcaption>
      </figure>

      <figure>
        <img src="images/Saturn_V_cutaway.jpg" alt="Разрез Saturn V">
        <figcaption>Разрез Saturn V — схема</figcaption>
      </figure>

      <figure>
        <img src="images/Apollo-11-astronaut-Buzz-Aldrin-stands-next-to-a-flag-on-the-moon-on-July-20-1969.-NASA-960x600.jpg" alt="Базз Олдрин — сбор образцов">
        <figcaption>Сбор образцов — Базз Олдрин</figcaption>
      </figure>

      <figure>
        <img src="images/Trajectory%20diagram.jpg" alt="Схема траектории">
        <figcaption>Схема траектории полёта</figcaption>
      </figure>

    </section>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <small>© 1969–2026 Apollo 11 Archive — учебный проект.</small>
    </div>
  </footer>
